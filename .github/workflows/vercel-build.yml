name: Vercel build smoke test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERCEL: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vercel static export
        run: npm run build

      - name: Verify deployable output
        run: test -f dist/client/index.html
